name: Build
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    types: [ opened, reopened ]
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint and type-check
        run: |
          ruff check .
          mypy app/

      - name: Audit dependencies
        run: pip-audit

      - name: Run tests
        run: pytest -v

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ github.repository_owner }}/${{ github.event.repository.name }}

      - name: Log in to Docker Hub
        if: ${{ github.event.repository.name == 'fastapi-app-template' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event.repository.name == 'fastapi-app-template' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
